# nginx reverse proxy for vestaboard.corti.com -> Streamlit UI on 127.0.0.1:8501
# Install (the 443/redirect blocks are added automatically by certbot):
#   sudo cp deploy/nginx-vestaboard.corti.com.conf /etc/nginx/sites-available/vestaboard.corti.com
#   sudo ln -s /etc/nginx/sites-available/vestaboard.corti.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d vestaboard.corti.com --redirect
server {
    listen 80;
    server_name vestaboard.corti.com;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # WebSocket support — Streamlit keeps a long-lived connection on _stcore/stream
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 86400s;

        proxy_buffering off;
    }

    access_log /var/log/nginx/vestaboard.corti.com_access.log;
    error_log /var/log/nginx/vestaboard.corti.com_error.log;
}
